<div class="app-shell">
  <header class="app-nav">
    <div class="brand">
      <span class="brand-mark">EGP</span>
      <div>
        <h1>Event Gift Planner</h1>
        <p>Plan moments. Pick gifts. Deliver joy.</p>
      </div>
    </div>
    <nav class="nav-links">
      <a routerLink="/">Home</a>
      <a routerLink="/events">Events</a>
      <a routerLink="/gifts">Gifts</a>
      <a routerLink="/cart">Cart</a>
      <a routerLink="/orders">Orders</a>
      <a routerLink="/notifications">Notifications</a>
    </nav>
    <div class="nav-actions" *ngIf="!(auth.user$ | async); else loggedIn">
      <a routerLink="/login" class="btn ghost">Login</a>
      <a routerLink="/signup" class="btn primary">Sign up</a>
    </div>
    <ng-template #loggedIn>
      <div class="nav-actions">
        <button class="btn ghost" (click)="logout()">Logout</button>
      </div>
    </ng-template>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>

  <footer class="app-footer">
    <span>Event Gift Planner</span>
    <span>Built for joyful moments.</span>
  </footer>
</div>
