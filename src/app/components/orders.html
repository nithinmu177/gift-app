<div class="section-title">
  <h2>Order tracking</h2>
  <span class="pill">Live delivery</span>
</div>

<div class="split">
  <section class="card">
    <h3>Orders</h3>
    <div class="order-list">
      <div class="order-row" *ngFor="let order of orders">
        <div>
          <h4>{{ order.name }}</h4>
          <p>{{ order.id }} · {{ order.eta }}</p>
        </div>
        <span class="tag">{{ order.status }}</span>
      </div>
    </div>
  </section>

  <aside class="card">
    <h3>Delivery timeline</h3>
    <div class="timeline">
      <div class="timeline-step" *ngFor="let step of timeline">
        <div class="dot"></div>
        <div>
          <h4>{{ step }}</h4>
          <p>Updates sent by SMS and email.</p>
        </div>
      </div>
    </div>
  </aside>
</div>
